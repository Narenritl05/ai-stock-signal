name: AI Stock Signal

# ─────────────────────────────────────────────────────────────
# รันวิเคราะห์หุ้นอัตโนมัติ/เมื่อกดเอง + ส่ง Telegram + อัปเดต dashboard
# ฟรี 100% บน GitHub Actions (ไม่มีค่า server)
# ─────────────────────────────────────────────────────────────
on:
  schedule:
    # รันทุก 30 นาทีบน GitHub Actions เพื่ออัปเดต dashboard ให้เป็นรอบล่าสุด
    # หมายเหตุ: schedule ของ GitHub อาจหน่วงเล็กน้อยตามคิวของ GitHub
    - cron: "*/30 * * * *"
  workflow_dispatch:           # กดรันเองได้จากหน้า Actions

# ต้องมีสิทธิ์เขียน เพื่อ commit signals.json กลับเข้า repo
permissions:
  contents: write

concurrency:
  group: signal-output
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run analysis
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # รอบอัตโนมัติทุก 30 นาทีไม่ส่ง no-change heartbeat กัน Telegram เด้งถี่เกินไป
          NOTIFY_NO_CHANGES: ${{ github.event_name == 'schedule' && 'false' || 'true' }}
        run: python run.py

      - name: Commit updated signals + state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/signals.json docs/data/signals_foreign.json docs/data/performance.json docs/data/status.json docs/data/universe.json state/
          if git diff --staged --quiet; then
            echo "ไม่มีการเปลี่ยนแปลง — ข้ามการ commit"
          else
            git commit -m "chore: update signals $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin "$GITHUB_REF_NAME"
            git push origin "HEAD:$GITHUB_REF_NAME"
          fi
